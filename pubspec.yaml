name: tvonline
description: Premium streaming platform — Movies, Series & Live TV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.7.0

  # Video player — media_kit uses libmpv, soporta MKV/TS/MP4/HLS en todas las plataformas
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5

  # Local storage
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Images
  cached_network_image: ^3.4.0
  flutter_cache_manager: ^3.4.0

  # UI
  shimmer: ^3.0.0
  animations: ^2.0.11
  smooth_page_indicator: ^1.2.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/icon/icon_base.png"
  macos:
    generate_icns: true
    image_path: "assets/icon/icon_base.png"

# Pin platform packages to avoid jni/objective_c native assets bug in Flutter 3.41.9
dependency_overrides:
  path_provider_android: 2.2.12
  path_provider_foundation: 2.4.0
  shared_preferences_foundation: 2.5.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
