name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package as ZIP
        shell: powershell
        run: |
          $source = "build\windows\x64\runner\Release"
          $dest = "tvOnline-Windows.zip"
          Compress-Archive -Path "$source\*" -DestinationPath $dest
          Write-Host "Packaged successfully: $dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvOnline-Windows
          path: tvOnline-Windows.zip
          retention-days: 30
