name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.9'

# ── macOS → builds macOS .app ─────────────────────────────────────────────────
jobs:
  build-macos:
    name: macOS build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create env.json
        run: |
          cat > env.json << 'ENVEOF'
          {
            "SUPABASE_URL": "SUPABASE_URL_PLACEHOLDER",
            "SUPABASE_ANON_KEY": "ANON_KEY_PLACEHOLDER",
            "STORAGE_OBFUSCATION_KEY": "OBF_KEY_PLACEHOLDER"
          }
          ENVEOF
          # Replace placeholders with actual secrets
          sed -i '' "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" env.json
          sed -i '' "s|ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" env.json
          sed -i '' "s|OBF_KEY_PLACEHOLDER|${{ secrets.STORAGE_OBFUSCATION_KEY }}|g" env.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Install macOS pods
        run: cd macos && pod install --repo-update

      - name: Build macOS
        run: flutter build macos --dart-define-from-file=env.json

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/tvOnline-macOS.zip" tvonline.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: tvOnline-macOS.zip
          retention-days: 1

# ── Ubuntu → Android APK ───────────────────────────────────────────────────────
  build-android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create env.json
        run: |
          cat > env.json << EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "STORAGE_OBFUSCATION_KEY": "${{ secrets.STORAGE_OBFUSCATION_KEY }}"
          }
          EOF

      - name: Set up Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.jks
            cat > android/key.properties << EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
            echo "✓ Keystore configurado para firma release"
          else
            echo "⚠ Sin keystore: usando firma debug"
          fi

      - name: Build Android APK
        run: |
          flutter build apk --release --dart-define-from-file=env.json
          mv build/app/outputs/flutter-apk/app-release.apk tvOnline-Android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: tvOnline-Android.apk
          retention-days: 1

# ── Windows ────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create env.json
        shell: pwsh
        run: |
          $json = @{
            SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"
            SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}"
            STORAGE_OBFUSCATION_KEY = "${{ secrets.STORAGE_OBFUSCATION_KEY }}"
          } | ConvertTo-Json
          Set-Content -Path env.json -Value $json -Encoding UTF8

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --dart-define-from-file=env.json

      - name: Zip Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "tvOnline-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: tvOnline-Windows.zip
          retention-days: 1

# ── Create GitHub Release with all artifacts ───────────────────────────────────
  release:
    name: Publish release
    needs: [build-macos, build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: tvOnline ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/tvOnline-macOS.zip
            artifacts/tvOnline-Android.apk
            artifacts/tvOnline-Windows.zip
          body: |
            # tvOnline ${{ steps.tag.outputs.tag }}

            Aplicación de streaming IPTV disponible para iOS, macOS, Android y Windows.

            ---

            ## 📱 iOS — iPhone / iPad

            > Requiere conexión al Mac con Xcode instalado (cuenta de desarrollador Apple gratuita).

            1. Descarga **tvOnline.ipa** desde los assets de este release
            2. Conecta el iPhone al Mac y ejecuta:
               ```bash
               xcrun devicectl list devices
               xcrun devicectl device install app --device TU_DEVICE_ID tvOnline.ipa
               ```
            3. En el iPhone: **Ajustes → General → VPN y gestión de dispositivos** → confía en el desarrollador

            ---

            ## 🍎 macOS

            1. Descarga **tvOnline-macOS.zip** y descomprime
            2. **Primera vez:** haz **clic derecho → Abrir** en `tvonline.app`
            3. Confirma en el diálogo de seguridad de Gatekeeper
            4. Opcionalmente mueve la app a `/Applications`

            > Si sigue bloqueada: **Ajustes del Sistema → Privacidad y seguridad → Abrir de todas formas**

            ---

            ## 🤖 Android

            1. En tu Android: **Ajustes → Aplicaciones → Instalar apps desconocidas** → actívalo para tu navegador
            2. Descarga **tvOnline-Android.apk** directamente en el dispositivo
            3. Toca el archivo descargado e instala

            > Requiere Android 6.0 (API 23) o superior.

            ---

            ## 🪟 Windows

            1. Descarga **tvOnline-Windows.zip** y descomprime en la ubicación que prefieras
            2. Ejecuta **tvonline.exe**
            3. Si Windows Defender SmartScreen lo bloquea: **Más información → Ejecutar de todas formas**

            > Requiere Windows 10 versión 1903+ (64-bit). No necesita instalación.

            ---

            ## ⚙️ Primer inicio

            La primera vez aparecerá la pantalla de configuración:
            - **URL del servidor** IPTV (ej. `http://tuservidor.com:8080`)
            - **Usuario** y **contraseña** de tu cuenta IPTV

            Una vez configurado, el acceso queda guardado de forma segura en el dispositivo.
